<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account — Subtitle Studio</title>
<script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/vars.css') }}">
<link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
<style>
.auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--color-bg-1); }
.auth-card { background: var(--color-bg-2); border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: var(--shadow-md); }
.auth-logo { text-align: center; margin-bottom: 0.5rem; font-size: 1.6rem; font-weight: 700; color: var(--color-accent); }
.auth-subtitle { text-align: center; color: var(--color-text-2); margin-bottom: 2rem; font-size: 0.95rem; }
.form-group { margin-bottom: 1rem; }
.form-group label { display: block; font-size: 0.85rem; color: var(--color-text-2); margin-bottom: 0.4rem; }
.form-group input { width: 100%; box-sizing: border-box; padding: 0.65rem 0.9rem; border-radius: var(--radius-md); background: var(--color-bg-3); border: 1px solid transparent; color: var(--color-text-1); font-size: 0.95rem; transition: border-color .15s; }
.form-group input:focus { outline: none; border-color: var(--color-accent); }
.btn-submit { width: 100%; padding: 0.75rem; background: var(--color-accent); color: #fff; border: none; border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; margin-top: 0.5rem; }
.btn-submit:hover { background: var(--color-accent-hover); }
.auth-foot { text-align: center; margin-top: 1.25rem; font-size: 0.85rem; color: var(--color-text-2); }
.auth-foot a { color: var(--color-accent); text-decoration: none; }
.flash-error { background: rgba(231,76,60,.15); border: 1px solid rgba(231,76,60,.4); color: #e74c3c; border-radius: var(--radius-md); padding: 0.65rem 0.9rem; margin-bottom: 1rem; font-size: 0.88rem; }
#pw-err { color: #e74c3c; font-size: 0.82rem; margin-top: 4px; display: none; }
.auth-header-bar { display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:var(--color-bg-2); border-bottom:1px solid var(--color-bg-3); }
</style>
</head>
<body>
<div class="auth-header-bar">
  <a href="/" style="font-weight:700;color:var(--color-accent);text-decoration:none;">Subtitle Studio</a>
  <button onclick="toggleTheme()" class="btn icon-btn theme-toggle-btn" title="Toggle theme">☀/☾</button>
</div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">🚀 Get started free</div>
    <p class="auth-subtitle">Create your account</p>

    {% with messages = get_flashed_messages(category_filter=['error']) %}
      {% if messages %}
        {% for msg in messages %}
          <div class="flash-error">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="/auth/register" id="reg-form">
      <div class="form-group">
        <label for="display_name">Display Name</label>
        <input type="text" id="display_name" name="display_name" placeholder="Your name" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="confirm">Confirm Password</label>
        <input type="password" id="confirm" name="confirm" required placeholder="••••••••" autocomplete="new-password">
        <div id="pw-err">Passwords do not match</div>
      </div>
      <button type="submit" class="btn-submit">Create Account</button>
    </form>

    <p class="auth-foot">Already have an account? <a href="/auth/login">Sign In →</a></p>
  </div>
</div>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script>
document.getElementById('reg-form').addEventListener('submit', function(e) {
    var pw = document.getElementById('password').value;
    var confirm = document.getElementById('confirm').value;
    var err = document.getElementById('pw-err');
    if (pw !== confirm) {
        e.preventDefault();
        err.style.display = 'block';
    } else {
        err.style.display = 'none';
    }
});
</script>
</body>
</html>
